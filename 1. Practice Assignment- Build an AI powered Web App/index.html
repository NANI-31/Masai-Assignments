<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fridge Hero | AI-Powered Gourmet Recipes</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        h1,
        h2,
        h3 {
            font-family: 'Outfit', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .recipe-card {
            background: rgba(255, 255, 255, 0.95);
            transition: all 0.3s ease;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Staggered Reveal Classes */
        .reveal-item {
            opacity: 0;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-6 text-white overflow-x-hidden">

    <!-- Hero Section -->
    <header class="text-center mb-10 fade-in">
        <h1 class="text-5xl md:text-6xl font-bold mb-4 drop-shadow-lg tracking-tight">
            Fridge <span class="text-orange-400">Hero</span>
        </h1>
        <p class="text-lg opacity-90 max-w-md mx-auto leading-relaxed">
            Turn your leftover ingredients into a gourmet masterpiece using the power of AI.
        </p>
    </header>

    <!-- Main Container -->
    <main class="w-full max-w-2xl fade-in" style="animation-delay: 0.1s;">
        <!-- Input Section -->
        <div class="glass rounded-3xl p-8 mb-8 shadow-2xl">
            <div class="mb-6">
                <label for="    " class="block text-sm font-semibold mb-2 opacity-80 uppercase tracking-widest">Gemini
                    API Key</label>
                <input type="password" id="api-key" placeholder="Enter your API Key here..."
                    class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-orange-400 transition-all">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <div class="space-y-2">
                    <label class="block text-xs font-semibold opacity-70 uppercase tracking-wider">Ingredient 1</label>
                    <input type="text" id="ing-1" placeholder="e.g. Tomato"
                        class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-orange-400 transition-all">
                </div>
                <div class="space-y-2">
                    <label class="block text-xs font-semibold opacity-70 uppercase tracking-wider">Ingredient 2</label>
                    <input type="text" id="ing-2" placeholder="e.g. Onion"
                        class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-orange-400 transition-all">
                </div>
                <div class="space-y-2">
                    <label class="block text-xs font-semibold opacity-70 uppercase tracking-wider">Ingredient 3</label>
                    <input type="text" id="ing-3" placeholder="e.g. Cheese"
                        class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-orange-400 transition-all">
                </div>
            </div>

            <button id="cook-magic"
                class="w-full bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-400 hover:to-orange-500 text-white font-bold py-4 rounded-xl shadow-lg transform hover:-translate-y-1 transition-all active:scale-95 flex items-center justify-center gap-2">
                <span id="btn-text">Cook Magic</span>
            </button>
        </div>

        <!-- Result Section -->
        <div id="result-container" class="hidden fade-in">
            <div class="recipe-card rounded-3xl p-10 text-gray-800 shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10">
                    <svg class="w-24 h-24" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"></path>
                        <path fill-rule="evenodd"
                            d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h.01a1 1 0 100-2H10zm3 0a1 1 0 000 2h.01a1 1 0 100-2H13zM7 13a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h.01a1 1 0 100-2H10zm3 0a1 1 0 000 2h.01a1 1 0 100-2H13z"
                            clip-rule="evenodd"></path>
                    </svg>
                </div>
                <div id="recipe-content">
                    <!-- Dynamic Content -->
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_KEY_INPUT = document.getElementById('api-key');
        const COOK_BTN = document.getElementById('cook-magic');
        const BTN_TEXT = document.getElementById('btn-text');
        const RESULT_CONTAINER = document.getElementById('result-container');
        const RECIPE_CONTENT = document.getElementById('recipe-content');

        // Ingredients
        const ing1 = document.getElementById('ing-1');
        const ing2 = document.getElementById('ing-2');
        const ing3 = document.getElementById('ing-3');

        COOK_BTN.addEventListener('click', async () => {
            const apiKey = API_KEY_INPUT.value.trim();
            const ingredients = [ing1.value.trim(), ing2.value.trim(), ing3.value.trim()].filter(i => i !== "");

            if (!apiKey) {
                alert("Please enter your Gemini API Key.");
                return;
            }

            if (ingredients.length === 0) {
                alert("Please enter at least one ingredient.");
                return;
            }

            // Loading state
            COOK_BTN.disabled = true;
            BTN_TEXT.innerHTML = '<span class="loader"></span>Preparing Magic...';
            RESULT_CONTAINER.classList.add('hidden');

            try {
                const prompt = `I have ${ingredients.join(", ")}. Give me a fancy dish name in english and a simple 3 step recipe in english. Format your response in HTML-like structure: 
                <h2 class="text-3xl font-bold text-orange-600 mb-2">DISH NAME</h2>
                <div class="h-1 w-20 bg-orange-400 mb-6"></div>
                <h3 class="text-xl font-semibold mb-4">Steps:</h3>
                <ol class="space-y-4">
                    <li class="flex gap-4"><span class="font-bold text-orange-500">01</span> <p>Step 1</p></li>
                    <li class="flex gap-4"><span class="font-bold text-orange-500">02</span> <p>Step 2</p></li>
                    <li class="flex gap-4"><span class="font-bold text-orange-500">03</span> <p>Step 3</p></li>
                </ol>
                Only provide the HTML block above.`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                if (response.status === 429) {
                    throw new Error("Rate limit exceeded. Please wait 1 minute before trying again.");
                }

                if (!response.ok) {
                    const errorDetails = await response.json().catch(() => ({}));
                    throw new Error(errorDetails.error?.message || "API call failed. Check your key and connection.");
                }

                const data = await response.json();

                if (!data.candidates || data.candidates.length === 0) {
                    throw new Error("No recipe could be generated. Try different ingredients.");
                }

                let result = data.candidates[0].content.parts[0].text;

                // Clean up any markdown code blocks if the AI included them
                result = result.replace(/```html|```/g, "");

                RECIPE_CONTENT.innerHTML = result;
                RESULT_CONTAINER.classList.remove('hidden');

                // Trigger Staggered Reveal
                staggerReveal();

                RESULT_CONTAINER.scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                console.error("Gemini Error:", error);
                RECIPE_CONTENT.innerHTML = `
                    <div class="p-6 bg-red-50 border border-red-200 rounded-2xl text-red-700">
                        <h4 class="font-bold mb-2">Oops! Something went wrong</h4>
                        <p class="text-sm">${error.message}</p>
                    </div>
                `;
                RESULT_CONTAINER.classList.remove('hidden');
                RESULT_CONTAINER.scrollIntoView({ behavior: 'smooth' });
            } finally {
                COOK_BTN.disabled = false;
                BTN_TEXT.innerHTML = 'Cook Magic';
            }
        });

        function staggerReveal() {
            // Get all direct children of the recipe content (H2, Div, H3, OL)
            const elements = Array.from(RECIPE_CONTENT.children);

            elements.forEach((el, index) => {
                // Remove any existing animation classes if re-running
                el.classList.remove('reveal-item');

                // Force a reflow to restart animation
                void el.offsetWidth;

                // Apply the animation class
                el.classList.add('reveal-item');

                // Set the stagger delay (100ms interval)
                el.style.animationDelay = `${index * 0.15}s`;
            });

            // Special handling for the steps in the OL to reveal them one by one
            const listItems = RECIPE_CONTENT.querySelectorAll('li');
            if (listItems.length > 0) {
                // Start the LI items after the initial header elements
                const headerCount = elements.length - 1; // Everything except the list
                listItems.forEach((li, index) => {
                    li.classList.add('reveal-item');
                    li.style.animationDelay = `${(headerCount + index) * 0.15}s`;
                });
            }
        }
    </script>

</body>

</html>
